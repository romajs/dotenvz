name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v1.2.3)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - runner: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          ARCHIVE="dotenvz-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "${ARCHIVE}" \
            -C "target/${{ matrix.target }}/release" \
            dotenvz dz
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $archive = "dotenvz-$env:VERSION-${{ matrix.target }}.zip"
          Compress-Archive -Path `
            "target/${{ matrix.target }}/release/dotenvz.exe", `
            "target/${{ matrix.target }}/release/dz.exe" `
            -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding utf8 "$archive.sha256"
          "ARCHIVE=$archive" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
